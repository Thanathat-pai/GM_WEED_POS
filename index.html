  );
}

// ── POS VIEW ─────────────────────────────────────────────────
function POSView({ db, currentStaff }) {
  const [strains, setStrains]     = useState([]);
  const [customers, setCustomers] = useState([]);
  const [cart, setCart]           = useState([]);
  const [customer, setCustomer]   = useState(null);
  const [searchQ, setSearchQ]     = useState('');
  const [payMethod, setPayMethod] = useState('cash');
  const [billDiscOpen, setBillDiscOpen] = useState(false);
  const [billDiscType, setBillDiscType] = useState('pct');
  const [billDiscVal, setBillDiscVal]   = useState('');
  const [billDiscNote, setBillDiscNote] = useState('');
  const [loading, setLoading]     = useState(false);
  const [msg, setMsg]             = useState(null);
  const [showCustModal, setShowCustModal] = useState(false);
  const [mobileTab, setMobileTab] = useState('strains');

  useEffect(() => { loadStrains(); loadCustomers(); }, []);

  async function loadStrains() {
    const { data } = await db.from('strains').select('*').eq('is_active', true).order('name');
    if (data) setStrains(data);
  }
  async function loadCustomers() {
    const { data } = await db.from('customers').select('id,name,phone,id_card,total_spent,visit_count').order('name');
    if (data) setCustomers(data);
  }

  const filtered = strains.filter(s => s.name.toLowerCase().includes(searchQ.toLowerCase()));

  function addToCart(strain) {
    if (strain.stock_g <= 0) return;
    setCart(prev => {
      if (prev.find(c => c.strain_id === strain.id)) return prev;
      return [...prev, { strain_id: strain.id, strain_name: strain.name, price_per_g: strain.price_per_g, weight_g: 1, disc_type: 'none', disc_value: 0, discOpen: false }];
    });
  }

  function updateCart(strain_id, field, val) {
    setCart(prev => prev.map(c => c.strain_id === strain_id ? { ...c, [field]: val } : c));
  }
  function removeCart(strain_id) {
    setCart(prev => prev.filter(c => c.strain_id !== strain_id));
  }

  const itemSubtotal = cart.reduce((a, c) => a + c.price_per_g * c.weight_g, 0);
  const itemDisc     = cart.reduce((a, c) => a + (c.price_per_g * c.weight_g - itemNet(c)), 0);
  const afterItemDisc = itemSubtotal - itemDisc;
  const billDiscAmt  = billDiscOpen && billDiscVal
    ? billDiscType === 'pct' ? afterItemDisc * parseFloat(billDiscVal) / 100
    : Math.min(parseFloat(billDiscVal), afterItemDisc)
    : 0;
  const grand = Math.max(0, afterItemDisc - billDiscAmt);

  async function checkout() {
    if (!cart.length) return;
    setLoading(true);
    try {
      const { data: txn, error: txnErr } = await db.from('transactions').insert({
        txn_code: txnCode(),
        customer_id: customer?.id || null,
        payment_method: payMethod,
        subtotal: itemSubtotal,
        discount_item: itemDisc,
        discount_bill: billDiscAmt,
        discount_note: billDiscNote || null,
        grand_total: grand,
        staff_id: currentStaff?.id || null,
      }).select().single();
      if (txnErr) throw txnErr;

      const items = cart.map(c => ({
        transaction_id: txn.id,
        strain_id: c.strain_id,
        strain_name: c.strain_name,
        price_per_g: c.price_per_g,
        weight_g: c.weight_g,
        disc_type: c.disc_type !== 'none' ? c.disc_type : null,
        disc_value: c.disc_value,
        line_total: itemNet(c),
      }));
      const { error: itemErr } = await db.from('transaction_items').insert(items);
      if (itemErr) throw itemErr;

      setMsg({ type: 'ok', text: `ชำระเงินสำเร็จ ${fmt(grand)} — บิล ${txn.txn_code}` });
      setCart([]); setCustomer(null); setBillDiscOpen(false); setBillDiscVal(''); setBillDiscNote('');
      loadStrains();
      setTimeout(() => setMsg(null), 4000);
    } catch (e) {
      setMsg({ type: 'err', text: 'เกิดข้อผิดพลาด: ' + e.message });
    }
    setLoading(false);
  }

  return (
    <div className="page">
      {msg && <div className={`alert alert-${msg.type === 'ok' ? 'ok' : 'err'}`}>{msg.text}</div>}
      {/* Mobile tab toggle — ซ่อนบน desktop ผ่าน CSS */}
      <div className="mob-pos-tabs">
        <button className={`mob-tab ${mobileTab==='strains'?'on':''}`} onClick={()=>setMobileTab('strains')}>
          🌿 สินค้า
        </button>
        <button className={`mob-tab ${mobileTab==='cart'?'on':''}`} onClick={()=>setMobileTab('cart')}>
          🛒 ตะกร้า
          {cart.length > 0 && <span className="mob-cart-badge">{cart.length}</span>}
        </button>
      </div>
      <div className={`pos-shell${mobileTab==='cart'?' mob-show-cart':''}`}>
        {/* STRAIN GRID */}
        <div className="strain-area">
          <div className="strain-tb">
            <input className="strain-search" placeholder="ค้นหา strain..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} />
          </div>
          {!strains.length
            ? <div className="empty"><div className="empty-icon">🌿</div><p>ยังไม่มีสินค้า — เพิ่มได้ที่แท็บ สต็อก</p></div>
            : <div className="sgrid">
                {filtered.map(s => (
                  <div key={s.id} className={`sc ${cart.find(c=>c.strain_id===s.id)?'sel':''} ${s.stock_g<=0?'disabled':''}`} onClick={()=>addToCart(s)}>
                    <div className="sc-top">
                      <span className={`pill ${typeCls[s.type]||'h'}`}>{typeLabel[s.type]||s.type}</span>
                      <span className={`pill ${stockCls(s)}`}>{stockLabel(s)}</span>
                    </div>
                    <div className="sc-name">{s.name}</div>
                    <div className="sc-sub">{s.thc_pct > 0 ? `THC ${s.thc_pct}%` : 'Full Spectrum'}</div>
                    <div className="sc-ft">
                      <span className="sc-price">{fmt(s.price_per_g)}/g</span>
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>

        {/* CART */}
        <div className="cart">
          {/* Customer picker */}
          <div className="cust-bar">
            {customer
              ? <><span className="cust-tag">👤 {customer.name}</span><button className="btn btn-sm btn-outline" onClick={()=>setCustomer(null)}>ลบ</button></>
              : <><span style={{fontSize:11,color:'var(--muted)'}}>ลูกค้า:</span>
                  <select style={{flex:1,fontSize:12,padding:'4px 8px',border:'1px solid var(--border)',borderRadius:6}} onChange={e=>{ const c=customers.find(x=>x.id===e.target.value); setCustomer(c||null); }}>
                    <option value="">ลูกค้าทั่วไป</option>
                    {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </>
            }
          </div>

          <div className="cart-hd">
            <h3>ตะกร้า ({cart.length})</h3>
            <button className="btn btn-sm btn-outline" onClick={()=>setCart([])}>ล้าง</button>
          </div>

          <div className="cart-body">
            {!cart.length
              ? <div className="empty" style={{padding:'30px 10px'}}><div className="empty-icon">🛒</div><p style={{fontSize:12}}>แตะ strain เพื่อเพิ่ม</p></div>
              : cart.map(ci => {
                  const base = ci.price_per_g * ci.weight_g;
                  const net  = itemNet(ci);
                  const saved = base - net;
                  return (
                    <div key={ci.strain_id} className="ci">
                      <div className="ci-main">
                        <div className="ci-info">
                          <div className="ci-name">{ci.strain_name}</div>
                          <div className="ci-unit">{fmt(ci.price_per_g)}/g</div>
                        </div>
                        <input className="gram-in" type="number" min={0.5} step={0.5} value={ci.weight_g}
                          onChange={e=>{ const v=parseFloat(e.target.value); if(isNaN(v)||v<=0) removeCart(ci.strain_id); else updateCart(ci.strain_id,'weight_g',v); }} />
                        <div className="ci-price">
                          {saved > 0
                            ? <><div style={{fontSize:10,color:'var(--muted)',textDecoration:'line-through'}}>{fmt(base)}</div>
                                <div style={{color:'var(--purple)',fontWeight:700}}>{fmt(net)}</div></>
                            : fmt(net)
                          }
                        </div>
                        <button className="disc-btn" onClick={()=>updateCart(ci.strain_id,'discOpen',!ci.discOpen)}>
                          {ci.discOpen ? '✕' : 'ลด'}
                        </button>
                        <button style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:16}} onClick={()=>removeCart(ci.strain_id)}>×</button>
                      </div>
                      {ci.discOpen && (
                        <div className="ci-disc">
                          <select className="disc-sel" value={ci.disc_type} onChange={e=>updateCart(ci.strain_id,'disc_type',e.target.value)}>
                            <option value="none">ไม่มีส่วนลด</option>
                            <option value="pct">% ลด</option>
                            <option value="baht">฿ ลดจากยอด</option>
                            <option value="price_per_g">ราคา/g พิเศษ</option>
                          </select>
                          {ci.disc_type !== 'none' &&
                            <input className="disc-in" type="number" min={0} value={ci.disc_value||''}
                              placeholder={ci.disc_type==='pct'?'เช่น 10':ci.disc_type==='baht'?'เช่น 50':'ราคา/g'}
                              onChange={e=>updateCart(ci.strain_id,'disc_value',parseFloat(e.target.value)||0)} />
                          }
                          {saved > 0 && <span className="disc-saved">ลด {fmt(saved)}</span>}
                        </div>
                      )}
                    </div>
                  );
                })
            }
          </div>

          {cart.length > 0 && <>
            <div className="bill-disc">
              <div className="bill-disc-hd">
                <span>ส่วนลดทั้งบิล</span>
                <button className="disc-btn" onClick={()=>setBillDiscOpen(v=>!v)}>{billDiscOpen?'✕ ยกเลิก':'+ เพิ่ม'}</button>
              </div>
              {billDiscOpen && (
                <div className="bill-disc-row">
                  <select className="disc-sel" value={billDiscType} onChange={e=>setBillDiscType(e.target.value)}>
                    <option value="pct">% ลด</option>
                    <option value="baht">฿ ลด</option>
                  </select>
                  <input className="disc-in" style={{flex:1}} type="number" min={0} placeholder="0" value={billDiscVal} onChange={e=>setBillDiscVal(e.target.value)} />
                  <input style={{flex:2,padding:'4px 8px',border:'1px solid var(--border)',borderRadius:6,fontSize:11}} placeholder="โน้ต เช่น โปรซื้อ 10g" value={billDiscNote} onChange={e=>setBillDiscNote(e.target.value)} />
                </div>
              )}
            </div>
            <div className="totals">
              <div className="tr muted"><span>ยอดรวม</span><span>{fmt(itemSubtotal)}</span></div>
              {itemDisc > 0 && <div className="tr disc"><span>ส่วนลดสินค้า</span><span>-{fmt(itemDisc)}</span></div>}
              {billDiscAmt > 0 && <div className="tr disc"><span>ส่วนลดทั้งบิล{billDiscNote?' ('+billDiscNote+')':''}</span><span>-{fmt(billDiscAmt)}</span></div>}
              <div className="tr big"><span>รวม</span><span>{fmt(grand)}</span></div>
            </div>
            <div className="pay-row">
              {[['cash','💵 เงินสด'],['qr','📱 QR'],['card','💳 บัตร']].map(([v,l])=>(
                <button key={v} className={`pb ${payMethod===v?'on':''}`} onClick={()=>setPayMethod(v)}>{l}</button>
              ))}
            </div>
          </>}
          <button className="pay-btn" onClick={checkout} disabled={!cart.length || loading}>
            {loading ? 'กำลังบันทึก...' : `ชำระเงิน ${fmt(grand)}`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── LOGIN SCREEN ─────────────────────────────────────────────
function LoginScreen({ db, onLogin }) {
  const [staffList, setStaffList]   = useState([]);
  const [selected, setSelected]     = useState(null);
  const [pin, setPin]               = useState('');
  const [errMsg, setErrMsg]         = useState('');
  const [shaking, setShaking]       = useState(false);
  const [loading, setLoading]       = useState(false);

  useEffect(() => { loadStaff(); }, []);

  async function loadStaff() {
    const { data } = await db.from('staff')
      .select('id, name').eq('is_active', true).order('name');
    if (data) setStaffList(data);
  }

  function selectStaff(s) {
    setSelected(s);
    setPin('');
    setErrMsg('');
  }

  async function handleDigit(d) {
    if (!selected || loading) return;
    const next = pin + d;
    setPin(next);
    setErrMsg('');

    if (next.length === 6) {
      setLoading(true);
      try {
        const { data: saltRow } = await db.from('staff')
          .select('pin_salt').eq('id', selected.id).single();
        if (!saltRow) throw new Error('ไม่พบข้อมูล');

        const hash = await hashPIN(saltRow.pin_salt, next);
        const { data: staffRow } = await db.from('staff')
          .select('id, name, role')
          .eq('id', selected.id)
          .eq('pin_hash', hash)
          .eq('is_active', true)
          .single();

        if (!staffRow) throw new Error('PIN ไม่ถูกต้อง');

        const session = { id: staffRow.id, name: staffRow.name, role: staffRow.role };
        localStorage.setItem('gm_staff', JSON.stringify(session));
        onLogin(session);
        return;
      } catch (e) {
        triggerError(e.message || 'PIN ไม่ถูกต้อง');
      }
      setLoading(false);
    }
  }

  function triggerError(msg) {
    setErrMsg(msg);
    setShaking(true);
    setPin('');
    setTimeout(() => setShaking(false), 400);
  }

  function handleBack() {
    setPin(p => p.slice(0, -1));
    setErrMsg('');
  }

  const numpadKeys = ['1','2','3','4','5','6','7','8','9','','0','del'];

  return (
    <div className="auth-shell">
      <div className="auth-card">
        <div className="auth-title">GM.Weed POS</div>
        <div className="auth-sub">เลือกพนักงานแล้วใส่ PIN</div>

        <div className="staff-list">
          {staffList.map(s => (
            <button key={s.id} className={`staff-btn ${selected?.id===s.id?'sel':''}`}
                    onClick={() => selectStaff(s)}>
              👤 {s.name}
            </button>
          ))}
          {!staffList.length && (
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:12,padding:12}}>
              <span className="spinner"></span>
            </div>
          )}
        </div>

        {selected && (
          <>
            <div className={`pin-dots ${shaking?'shake':''}`}>
              {[0,1,2,3,4,5].map(i => (
                <div key={i} className={`pin-dot ${i < pin.length ? (errMsg?'err':'filled') : ''}`}/>
              ))}
            </div>

            <div className="pin-err">{errMsg}</div>

            {loading
              ? <div style={{textAlign:'center',padding:20}}><span className="spinner"></span></div>
              : <div className="numpad">
                  {numpadKeys.map((k, i) => {
                    if (k === '')  return <div key={i} className="numpad-key empty"/>;
                    if (k === 'del') return (
                      <button key={i} className="numpad-key del" onClick={handleBack}
                              disabled={!pin.length}>⌫</button>
                    );
                    return (
                      <button key={i} className="numpad-key" onClick={() => handleDigit(k)}
                              disabled={pin.length >= 6}>{k}</button>
                    );
                  })}
                </div>
            }
          </>
        )}
      </div>
    </div>
  );
}

// ── BOOTSTRAP SCREEN ─────────────────────────────────────────
function BootstrapScreen({ db, onDone }) {
  const [name, setName]       = useState('');
  const [pin1, setPin1]       = useState('');
  const [pin2, setPin2]       = useState('');
  const [step, setStep]       = useState('name'); // 'name' | 'pin1' | 'pin2'
  const [errMsg, setErrMsg]   = useState('');
  const [shaking, setShaking] = useState(false);
  const [loading, setLoading] = useState(false);

  const canSubmit = name.trim() && pin1.length === 6 && pin2.length === 6;

  function handleDigit(d) {
    setErrMsg('');
    if (step === 'name' && name.trim()) setStep('pin1');
    if (step === 'pin1' && pin1.length < 6) {
      const next = pin1 + d;
      setPin1(next);
      if (next.length === 6) setStep('pin2');
    } else if (step === 'pin2' && pin2.length < 6) {
      setPin2(pin2 + d);
    }
  }

  function handleBack() {
    setErrMsg('');
    if (step === 'pin2' && pin2.length === 0) { setStep('pin1'); setPin1(p=>p.slice(0,-1)); }
    else if (step === 'pin2') setPin2(p=>p.slice(0,-1));
    else if (step === 'pin1') setPin1(p=>p.slice(0,-1));
  }

  async function submit() {
    if (pin1 !== pin2) {
      setErrMsg('PIN ไม่ตรงกัน'); setShaking(true); setPin1(''); setPin2(''); setStep('pin1');
      setTimeout(()=>setShaking(false), 400); return;
    }
    setLoading(true);
    try {
      const salt = generateSalt();
      const hash = await hashPIN(salt, pin1);
      const { data, error } = await db.from('staff')
        .insert({ name: name.trim(), pin_hash: hash, pin_salt: salt, role: 'owner' })
        .select('id, name, role').single();
      if (error) throw error;
      const session = { id: data.id, name: data.name, role: data.role };
      localStorage.setItem('gm_staff', JSON.stringify(session));
      onDone(session);
      return;
    } catch(e) {
      setErrMsg(e.message || 'เกิดข้อผิดพลาด');
    }
    setLoading(false);
  }

  const currentPin = step === 'pin1' ? pin1 : pin2;
  const numpadKeys = ['1','2','3','4','5','6','7','8','9','','0','del'];

  return (
    <div className="auth-shell">
      <div className="auth-card">
        <div className="auth-title">ตั้งค่าระบบครั้งแรก</div>
        <div className="auth-sub">สร้างบัญชี Owner เพื่อเริ่มใช้งาน</div>

        <div style={{marginBottom:16}}>
          <label>ชื่อเจ้าของร้าน</label>
          <input value={name} onChange={e=>{ setName(e.target.value); setErrMsg(''); }}
                 placeholder="เช่น สมชาย" onFocus={()=>setStep('name')} />
        </div>

        <div className="auth-section">
          <div className="auth-section-label">
            {step === 'pin1' || pin1.length === 0 ? 'ตั้ง PIN (6 หลัก)' : 'ยืนยัน PIN อีกครั้ง'}
          </div>

          <div className={`pin-dots ${shaking?'shake':''}`} style={{marginBottom:12}}>
            {[0,1,2,3,4,5].map(i => (
              <div key={i} className={`pin-dot ${i < currentPin.length ? (errMsg?'err':'filled') : ''}`}/>
            ))}
          </div>

          {pin1.length === 6 && step !== 'pin1' && (
            <div style={{fontSize:11,textAlign:'center',color:'var(--muted)',marginBottom:10}}>
              ✓ PIN แรกครบแล้ว — ยืนยัน PIN อีกครั้ง
            </div>
          )}

          <div className="pin-err">{errMsg}</div>

          {name.trim() && !loading && (
            <div className="numpad">
              {numpadKeys.map((k, i) => {
                if (k === '') return <div key={i} className="numpad-key empty"/>;
                if (k === 'del') return (
                  <button key={i} className="numpad-key del" onClick={handleBack}>⌫</button>
                );
                return (
                  <button key={i} className="numpad-key" onClick={()=>handleDigit(k)}
                          disabled={currentPin.length >= 6}>{k}</button>
                );
              })}
            </div>
          )}

          {!name.trim() && (
            <div style={{textAlign:'center',fontSize:12,color:'var(--muted)',padding:8}}>
              ใส่ชื่อก่อน แล้วค่อยตั้ง PIN
            </div>
          )}
        </div>

        <button className="btn btn-primary" style={{width:'100%',marginTop:20,padding:12,fontSize:14}}
                onClick={submit} disabled={!canSubmit || loading}>
          {loading ? 'กำลังบันทึก...' : 'เริ่มใช้งาน'}
        </button>
      </div>
    </div>
  );
}

// ── STOCK / STRAIN MANAGEMENT ────────────────────────────────
function StockView({ db }) {
  const [strains, setStrains]     = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [lots, setLots]           = useState([]);
  const [modal, setModal]         = useState(null); // 'strain' | 'lot'
  const [editing, setEditing]     = useState(null);
  const [loading, setLoading]     = useState(false);
  const [msg, setMsg]             = useState(null);
  const [tab, setTab]             = useState('strains'); // 'strains' | 'lots'

  const initStrain = { name:'', type:'sativa', thc_pct:'', cbd_pct:'', price_per_g:'', max_stock_g:'100', is_active:true };
  const initLot    = { strain_id:'', supplier_id:'', received_date:today(), weight_g:'', cost_per_g:'', thc_lab:'', cbd_lab:'', coa_number:'', coa_lab_name:'', expiry_date:'', note:'' };
  const [form, setForm] = useState(initStrain);

  useEffect(()=>{ load(); },[]);

  async function load() {
    const [s, sup, l] = await Promise.all([
      db.from('strains').select('*').order('name'),
      db.from('suppliers').select('*').order('name'),
      db.from('inventory_lots').select('*,strains(name),suppliers(name)').order('created_at',{ascending:false}).limit(50),
    ]);
    if (s.data)   setStrains(s.data);
    if (sup.data) setSuppliers(sup.data);
    if (l.data)   setLots(l.data);
  }

  const set = (f, v) => setForm(p => ({ ...p, [f]: v }));

  async function saveStrain() {
    setLoading(true);
    const payload = {
      name: form.name, type: form.type,
      thc_pct: parseFloat(form.thc_pct)||0, cbd_pct: parseFloat(form.cbd_pct)||0,
      price_per_g: parseFloat(form.price_per_g),
      max_stock_g: parseFloat(form.max_stock_g)||100,
      is_active: form.is_active,
    };
    let error;
    if (editing) { ({ error } = await db.from('strains').update(payload).eq('id',editing.id)); }
    else { ({ error } = await db.from('strains').insert(payload)); }
    if (error) setMsg({ type:'err', text: error.message });
    else { setMsg({ type:'ok', text: editing ? 'อัปเดตสำเร็จ' : 'เพิ่ม strain สำเร็จ' }); setModal(null); load(); }
    setLoading(false);
    setTimeout(()=>setMsg(null), 3000);
  }

  async function saveLot() {
    if (!form.strain_id || !form.weight_g) return;
    setLoading(true);
    const { error } = await db.from('inventory_lots').insert({
      lot_code: lotCode(),
      strain_id: form.strain_id,
      supplier_id: form.supplier_id || null,
      received_date: form.received_date,
      weight_g: parseFloat(form.weight_g),
      cost_per_g: parseFloat(form.cost_per_g)||null,
      thc_lab: parseFloat(form.thc_lab)||null,
      cbd_lab: parseFloat(form.cbd_lab)||null,
      coa_number: form.coa_number||null,
      coa_lab_name: form.coa_lab_name||null,
      expiry_date: form.expiry_date||null,
      note: form.note||null,
    });
    if (error) setMsg({ type:'err', text: error.message });
    else { setMsg({ type:'ok', text: 'รับสินค้าเข้าสำเร็จ — stock อัปเดตแล้ว' }); setModal(null); load(); }
    setLoading(false);
    setTimeout(()=>setMsg(null), 3000);
  }

  async function toggleActive(s) {
    await db.from('strains').update({ is_active: !s.is_active }).eq('id', s.id);
    load();
  }

  return (
    <div className="page">
      {msg && <div className={`alert alert-${msg.type==='ok'?'ok':'err'}`}>{msg.text}</div>}

      <div className="page-title">
        จัดการสต็อก
        <div style={{display:'flex',gap:8,marginLeft:'auto'}}>
          <button className="btn btn-blue" onClick={()=>{ setForm(initLot); setEditing(null); setModal('lot'); }}>+ รับสินค้าเข้า (Lot)</button>
          <button className="btn btn-primary" onClick={()=>{ setForm(initStrain); setEditing(null); setModal('strain'); }}>+ เพิ่ม Strain</button>
        </div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button className={`btn ${tab==='strains'?'btn-primary':'btn-outline'}`} onClick={()=>setTab('strains')}>Strains</button>
        <button className={`btn ${tab==='lots'?'btn-blue':'btn-outline'}`} onClick={()=>setTab('lots')}>ประวัติรับสินค้า (Lots)</button>
      </div>

      {tab === 'strains' && (
        <div className="card">
          <table>
            <thead><tr><th>Strain</th><th>ประเภท</th><th>THC%</th><th>CBD%</th><th>ราคา/g</th><th>สต็อก</th><th>สถานะ</th><th>แก้ไข</th></tr></thead>
            <tbody>
              {!strains.length && <tr><td colSpan={8} style={{textAlign:'center',color:'var(--muted)',padding:32}}>ยังไม่มีข้อมูล</td></tr>}
              {strains.map(s => {
                const pct = Math.min(100, Math.round((s.stock_g / (s.max_stock_g||1)) * 100));
                const cls = stockCls(s);
                return (
                  <tr key={s.id}>
                    <td style={{fontWeight:600}}>{s.name}</td>
                    <td><span className={`pill ${typeCls[s.type]||'h'}`}>{typeLabel[s.type]||s.type}</span></td>
                    <td>{s.thc_pct > 0 ? s.thc_pct + '%' : '—'}</td>
                    <td>{s.cbd_pct > 0 ? s.cbd_pct + '%' : '—'}</td>
                    <td>{fmt(s.price_per_g)}</td>
                    <td>
                      <span className={`pill ${cls}`} style={{marginRight:8}}>{stockLabel(s)}</span>
                      <span className="bar-wrap"><span className="bar" style={{width:pct+'%',background:cls==='ok'?'var(--green)':cls==='low'?'var(--amber)':'var(--red)'}}></span></span>
                    </td>
                    <td><span className={`pill ${s.is_active?'ok':'out'}`}>{s.is_active?'Active':'ปิด'}</span></td>
                    <td>
                      <div style={{display:'flex',gap:6}}>
                        <button className="btn btn-sm btn-outline" onClick={()=>{ setForm({...s,thc_pct:s.thc_pct||'',cbd_pct:s.cbd_pct||''}); setEditing(s); setModal('strain'); }}>แก้ไข</button>
                        <button className="btn btn-sm btn-outline" onClick={()=>toggleActive(s)}>{s.is_active?'ปิด':'เปิด'}</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {tab === 'lots' && (
        <div className="card">
          <table>
            <thead><tr><th>Lot Code</th><th>Strain</th><th>Supplier</th><th>วันรับ</th><th>น้ำหนัก</th><th>ต้นทุน/g</th><th>THC Lab</th><th>COA</th><th>หมดอายุ</th></tr></thead>
            <tbody>
              {!lots.length && <tr><td colSpan={9} style={{textAlign:'center',color:'var(--muted)',padding:32}}>ยังไม่มีประวัติ</td></tr>}
              {lots.map(l => (
                <tr key={l.id}>
                  <td style={{fontFamily:'monospace',fontSize:11}}>{l.lot_code}</td>
                  <td style={{fontWeight:600}}>{l.strains?.name || '—'}</td>
                  <td>{l.suppliers?.name || '—'}</td>
                  <td>{l.received_date}</td>
                  <td>{l.weight_g}g</td>
                  <td>{l.cost_per_g ? fmt(l.cost_per_g) : '—'}</td>
                  <td>{l.thc_lab ? l.thc_lab + '%' : '—'}</td>
                  <td>{l.coa_number ? <span className="coa-badge">COA: {l.coa_number}</span> : <span style={{color:'var(--muted)',fontSize:11}}>ไม่มี</span>}</td>
                  <td>{l.expiry_date || '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* MODAL STRAIN */}
      {modal === 'strain' && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div className="modal-hd">
              <h3>{editing ? 'แก้ไข Strain' : 'เพิ่ม Strain ใหม่'}</h3>
              <button className="close-btn" onClick={()=>setModal(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                <div><label>ชื่อ Strain *</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="เช่น Blue Dream" /></div>
                <div className="form-grid form-grid-2">
                  <div><label>ประเภท</label>
                    <select value={form.type} onChange={e=>set('type',e.target.value)}>
                      <option value="sativa">Sativa</option><option value="indica">Indica</option>
                      <option value="hybrid">Hybrid</option><option value="cbd">CBD</option>
                    </select>
                  </div>
                  <div><label>ราคา/กรัม (฿) *</label><input type="number" value={form.price_per_g} onChange={e=>set('price_per_g',e.target.value)} placeholder="450" /></div>
                </div>
                <div className="form-grid form-grid-3">
                  <div><label>THC%</label><input type="number" value={form.thc_pct} onChange={e=>set('thc_pct',e.target.value)} placeholder="22" /></div>
                  <div><label>CBD%</label><input type="number" value={form.cbd_pct} onChange={e=>set('cbd_pct',e.target.value)} placeholder="1" /></div>
                  <div><label>Max Stock (g)</label><input type="number" value={form.max_stock_g} onChange={e=>set('max_stock_g',e.target.value)} /></div>
                </div>
              </div>
            </div>
            <div className="modal-ft">
              <button className="btn btn-outline" onClick={()=>setModal(null)}>ยกเลิก</button>
              <button className="btn btn-primary" onClick={saveStrain} disabled={loading||!form.name||!form.price_per_g}>
                {loading ? 'กำลังบันทึก...' : 'บันทึก'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL LOT */}
      {modal === 'lot' && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div className="modal-hd">
              <h3>รับสินค้าเข้า — Lot / COA</h3>
              <button className="close-btn" onClick={()=>setModal(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="alert alert-info" style={{marginBottom:14}}>สต็อกจะเพิ่มอัตโนมัติหลังบันทึก Lot</div>
              <div className="form-grid">
                <div className="form-grid form-grid-2">
                  <div><label>Strain *</label>
                    <select value={form.strain_id} onChange={e=>set('strain_id',e.target.value)}>
                      <option value="">เลือก strain...</option>
                      {strains.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                    </select>
                  </div>
                  <div><label>ผู้จัดจำหน่าย (Supplier)</label>
                    <select value={form.supplier_id} onChange={e=>set('supplier_id',e.target.value)}>
                      <option value="">ไม่ระบุ</option>
                      {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-grid form-grid-2">
                  <div><label>วันที่รับสินค้า</label><input type="date" value={form.received_date} onChange={e=>set('received_date',e.target.value)} /></div>
                  <div><label>น้ำหนักรับเข้า (กรัม) *</label><input type="number" value={form.weight_g} onChange={e=>set('weight_g',e.target.value)} placeholder="เช่น 50" /></div>
                </div>
                <div className="form-grid form-grid-2">
                  <div><label>ต้นทุน/กรัม (฿)</label><input type="number" value={form.cost_per_g} onChange={e=>set('cost_per_g',e.target.value)} placeholder="เช่น 200" /></div>
                  <div><label>วันหมดอายุ</label><input type="date" value={form.expiry_date} onChange={e=>set('expiry_date',e.target.value)} /></div>
                </div>
                <div style={{borderTop:'1px solid var(--border)',paddingTop:14}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--blue)',marginBottom:10}}>📋 ข้อมูล COA (Certificate of Analysis)</div>
                  <div className="form-grid form-grid-2">
                    <div><label>เลขที่ COA</label><input value={form.coa_number} onChange={e=>set('coa_number',e.target.value)} placeholder="เช่น COA-2024-1234" /></div>
                    <div><label>ชื่อ Lab</label><input value={form.coa_lab_name} onChange={e=>set('coa_lab_name',e.target.value)} placeholder="เช่น ChemAnalysis Lab" /></div>
                  </div>
                  <div className="form-grid form-grid-2" style={{marginTop:10}}>
                    <div><label>THC% (จาก Lab)</label><input type="number" value={form.thc_lab} onChange={e=>set('thc_lab',e.target.value)} placeholder="เช่น 22.5" /></div>
                    <div><label>CBD% (จาก Lab)</label><input type="number" value={form.cbd_lab} onChange={e=>set('cbd_lab',e.target.value)} placeholder="เช่น 1.2" /></div>
                  </div>
                </div>
                <div><label>โน้ตเพิ่มเติม</label><textarea value={form.note} onChange={e=>set('note',e.target.value)} placeholder="หมายเหตุ..." /></div>
              </div>
            </div>
            <div className="modal-ft">
              <button className="btn btn-outline" onClick={()=>setModal(null)}>ยกเลิก</button>
              <button className="btn btn-blue" onClick={saveLot} disabled={loading||!form.strain_id||!form.weight_g}>
                {loading ? 'กำลังบันทึก...' : 'รับสินค้าเข้า'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CUSTOMERS VIEW ───────────────────────────────────────────
function CustomersView({ db }) {
  const [customers, setCustomers] = useState([]);
  const [history, setHistory]     = useState([]);
  const [modal, setModal]         = useState(null); // 'form' | 'history'
  const [editing, setEditing]     = useState(null);
  const [selected, setSelected]   = useState(null);
  const [loading, setLoading]     = useState(false);
  const [msg, setMsg]             = useState(null);
  const [searchQ, setSearchQ]     = useState('');
  const init = { name:'', id_card:'', birth_date:'', phone:'', note:'' };
  const [form, setForm] = useState(init);

  useEffect(()=>{ load(); },[]);

  async function load() {
    const { data } = await db.from('customers').select('*').order('name');
    if (data) setCustomers(data);
  }

  async function loadHistory(cid) {
    const { data } = await db.from('transactions')
      .select('txn_code,grand_total,payment_method,created_at,transaction_items(strain_name,weight_g,line_total)')
      .eq('customer_id', cid).order('created_at',{ascending:false}).limit(20);
    if (data) setHistory(data);
  }

  const set = (f,v) => setForm(p=>({...p,[f]:v}));
  const filtered = customers.filter(c =>
    c.name.toLowerCase().includes(searchQ.toLowerCase()) ||
    (c.phone && c.phone.includes(searchQ)) ||
    (c.id_card && c.id_card.includes(searchQ))
  );

  function calcAge(bd) {
    if (!bd) return null;
    const diff = Date.now() - new Date(bd).getTime();
    return Math.floor(diff / (365.25 * 24 * 3600 * 1000));
  }

  async function save() {
    const age = calcAge(form.birth_date);
    if (age !== null && age < 20) { setMsg({type:'err',text:'ลูกค้าต้องอายุ 20 ปีขึ้นไป'}); return; }
    setLoading(true);
    const payload = { name:form.name, id_card:form.id_card||null, birth_date:form.birth_date||null, phone:form.phone||null, note:form.note||null };
    let error;
    if (editing) { ({error} = await db.from('customers').update(payload).eq('id',editing.id)); }
    else { ({error} = await db.from('customers').insert(payload)); }
    if (error) setMsg({type:'err',text:error.message});
    else { setMsg({type:'ok',text:editing?'อัปเดตสำเร็จ':'เพิ่มลูกค้าสำเร็จ'}); setModal(null); load(); }
    setLoading(false);
    setTimeout(()=>setMsg(null),3000);
  }

  return (
    <div className="page">
      {msg && <div className={`alert alert-${msg.type==='ok'?'ok':'err'}`}>{msg.text}</div>}

      <div className="page-title">
        ข้อมูลลูกค้า
        <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={()=>{ setForm(init); setEditing(null); setModal('form'); }}>+ เพิ่มลูกค้า</button>
      </div>

      <div className="stats">
        <div className="stat"><div className="stat-label">ลูกค้าทั้งหมด</div><div className="stat-val">{customers.length}</div></div>
        <div className="stat"><div className="stat-label">ยอดรวมสะสม</div><div className="stat-val" style={{fontSize:18}}>{fmt(customers.reduce((a,c)=>a+(c.total_spent||0),0))}</div></div>
        <div className="stat"><div className="stat-label">เฉลี่ยต่อคน</div><div className="stat-val" style={{fontSize:18}}>{customers.length?fmt(customers.reduce((a,c)=>a+(c.total_spent||0),0)/customers.length):'฿0'}</div></div>
      </div>

      <div className="card">
        <div className="card-hd">
          <h3>รายชื่อลูกค้า</h3>
          <input style={{width:220,padding:'6px 10px',border:'1px solid var(--border)',borderRadius:7,fontSize:12}} placeholder="ค้นหาชื่อ, เบอร์, บัตร..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} />
        </div>
        <table>
          <thead><tr><th>ชื่อ</th><th>อายุ</th><th>เบอร์โทร</th><th>จำนวนครั้ง</th><th>ยอดสะสม</th><th>หมายเหตุ</th><th></th></tr></thead>
          <tbody>
            {!filtered.length && <tr><td colSpan={7} style={{textAlign:'center',color:'var(--muted)',padding:32}}>ไม่พบข้อมูล</td></tr>}
            {filtered.map(c => {
              const age = calcAge(c.birth_date);
              return (
                <tr key={c.id}>
                  <td>
                    <div style={{fontWeight:600}}>{c.name}</div>
                    {c.id_card && <div style={{fontSize:10,color:'var(--muted)'}}>บัตร: ****{c.id_card.slice(-4)}</div>}
                  </td>
                  <td>{age !== null ? <span className={`pill ${age>=20?'ok':'out'}`}>{age} ปี</span> : '—'}</td>
                  <td>{c.phone || '—'}</td>
                  <td>{c.visit_count} ครั้ง</td>
                  <td style={{fontWeight:600,color:'var(--green)'}}>{fmt(c.total_spent)}</td>
                  <td style={{fontSize:11,color:'var(--muted)'}}>{c.note||'—'}</td>
                  <td>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-sm btn-outline" onClick={()=>{ setEditing(c); setForm({...c,birth_date:c.birth_date||''}); setModal('form'); }}>แก้ไข</button>
                      <button className="btn btn-sm btn-blue" onClick={()=>{ setSelected(c); loadHistory(c.id); setModal('history'); }}>ประวัติ</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* FORM MODAL */}
      {modal === 'form' && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div className="modal-hd">
              <h3>{editing?'แก้ไขข้อมูลลูกค้า':'เพิ่มลูกค้าใหม่'}</h3>
              <button className="close-btn" onClick={()=>setModal(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="alert alert-warn" style={{marginBottom:14}}>ข้อมูลบัตรประชาชนถูกเก็บรักษาตาม PDPA — ใช้เพื่อยืนยันตัวตนเท่านั้น</div>
              <div className="form-grid">
                <div><label>ชื่อ-นามสกุล *</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="ชื่อลูกค้า" /></div>
                <div className="form-grid form-grid-2">
                  <div><label>เลขบัตรประชาชน</label><input value={form.id_card} onChange={e=>set('id_card',e.target.value)} placeholder="1-xxxx-xxxxx-xx-x" maxLength={13} /></div>
                  <div><label>วันเกิด (ยืนยันอายุ ≥ 20 ปี)</label>
                    <input type="date" value={form.birth_date} onChange={e=>set('birth_date',e.target.value)} max={new Date(Date.now()-20*365.25*24*3600*1000).toISOString().split('T')[0]} />
                    {form.birth_date && calcAge(form.birth_date) !== null &&
                      <div style={{fontSize:11,marginTop:4,color:calcAge(form.birth_date)>=20?'var(--green)':'var(--red)'}}>
                        อายุ {calcAge(form.birth_date)} ปี {calcAge(form.birth_date)<20?'— ❌ ต่ำกว่า 20 ปี':'— ✓'}
                      </div>
                    }
                  </div>
                </div>
                <div><label>เบอร์โทรศัพท์</label><input value={form.phone} onChange={e=>set('phone',e.target.value)} placeholder="08x-xxx-xxxx" /></div>
                <div><label>หมายเหตุ</label><textarea value={form.note} onChange={e=>set('note',e.target.value)} placeholder="โน้ตเพิ่มเติม..." /></div>
              </div>
            </div>
            <div className="modal-ft">
              <button className="btn btn-outline" onClick={()=>setModal(null)}>ยกเลิก</button>
              <button className="btn btn-primary" onClick={save} disabled={loading||!form.name}>
                {loading?'กำลังบันทึก...':'บันทึก'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* HISTORY MODAL */}
      {modal === 'history' && selected && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal" style={{maxWidth:620}}>
            <div className="modal-hd">
              <h3>ประวัติการซื้อ — {selected.name}</h3>
              <button className="close-btn" onClick={()=>setModal(null)}>×</button>
            </div>
            <div className="modal-body" style={{padding:0}}>
              <table>
                <thead><tr><th>วันที่</th><th>บิล</th><th>รายการ</th><th>จ่ายด้วย</th><th>ยอด</th></tr></thead>
                <tbody>
                  {!history.length && <tr><td colSpan={5} style={{textAlign:'center',color:'var(--muted)',padding:32}}>ยังไม่มีประวัติ</td></tr>}
                  {history.map(t=>(
                    <tr key={t.id||t.txn_code}>
                      <td style={{fontSize:11,whiteSpace:'nowrap'}}>{new Date(t.created_at).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'})}</td>
                      <td style={{fontFamily:'monospace',fontSize:10}}>{t.txn_code}</td>
                      <td style={{fontSize:11}}>{(t.transaction_items||[]).map(i=>`${i.strain_name} ${i.weight_g}g`).join(', ')}</td>
                      <td style={{fontSize:11}}>{t.payment_method==='cash'?'เงินสด':t.payment_method==='qr'?'QR':'บัตร'}</td>
                      <td style={{fontWeight:600,color:'var(--green)'}}>{fmt(t.grand_total)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="modal-ft">
              <button className="btn btn-outline" onClick={()=>setModal(null)}>ปิด</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── REPORT VIEW ──────────────────────────────────────────────
function ReportView({ db }) {
  const [txns, setTxns] = useState([]);
  const [range, setRange] = useState('today');
  const [loading, setLoading] = useState(false);

  useEffect(()=>{ loadReport(); },[range]);

  async function loadReport() {
    setLoading(true);
    let from = new Date();
    if (range === 'today')   from.setHours(0,0,0,0);
    if (range === 'week')    from.setDate(from.getDate()-7);
    if (range === 'month')   from.setDate(1), from.setHours(0,0,0,0);

    const { data } = await db.from('transactions')
      .select('*,transaction_items(strain_name,weight_g,line_total),customers(name)')
      .gte('created_at', from.toISOString())
      .order('created_at',{ascending:false});
    if (data) setTxns(data);
    setLoading(false);
  }

  const total   = txns.reduce((a,t)=>a+(t.grand_total||0),0);
  const discTot = txns.reduce((a,t)=>a+(t.discount_item||0)+(t.discount_bill||0),0);
  const grams   = txns.flatMap(t=>t.transaction_items||[]).reduce((a,i)=>a+(i.weight_g||0),0);

  // strain breakdown
  const strainMap = {};
  txns.forEach(t=>(t.transaction_items||[]).forEach(i=>{
    strainMap[i.strain_name] = (strainMap[i.strain_name]||0) + i.weight_g;
  }));
  const topStrains = Object.entries(strainMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxG = Math.max(...topStrains.map(([,g])=>g), 1);

  return (
    <div className="page">
      <div className="page-title">
        รายงานยอดขาย
        <div style={{display:'flex',gap:8,marginLeft:'auto'}}>
          {[['today','วันนี้'],['week','7 วัน'],['month','เดือนนี้']].map(([v,l])=>(
            <button key={v} className={`btn ${range===v?'btn-primary':'btn-outline'}`} onClick={()=>setRange(v)}>{l}</button>
          ))}
        </div>
      </div>

      <div className="stats">
        <div className="stat"><div className="stat-label">ยอดขาย</div><div className="stat-val">{fmt(total)}</div><div className="stat-sub">{txns.length} บิล</div></div>
        <div className="stat"><div className="stat-label">เฉลี่ย/บิล</div><div className="stat-val" style={{fontSize:18}}>{txns.length?fmt(total/txns.length):'฿0'}</div></div>
        <div className="stat"><div className="stat-label">ปริมาณขาย</div><div className="stat-val">{grams.toFixed(1)}g</div></div>
        <div className="stat"><div className="stat-label">ส่วนลดรวม</div><div className="stat-val" style={{fontSize:18,color:'var(--purple)'}}>{fmt(discTot)}</div></div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        <div className="card" style={{padding:18}}>
          <div style={{fontWeight:600,marginBottom:14,fontSize:13,color:'var(--muted)'}}>Strain ขายดี (กรัม)</div>
          {!topStrains.length ? <div style={{color:'var(--muted)',fontSize:12,textAlign:'center',padding:20}}>ยังไม่มีข้อมูล</div>
            : topStrains.map(([name,g])=>(
              <div key={name} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,fontSize:12}}>
                <div style={{width:90,textAlign:'right',color:'var(--muted)',fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</div>
                <div style={{flex:1,height:8,background:'var(--faint)',borderRadius:4}}><div style={{width:Math.round(g/maxG*100)+'%',height:'100%',background:'var(--green)',borderRadius:4}}></div></div>
                <div style={{fontWeight:600,width:48}}>{g.toFixed(1)}g</div>
              </div>
            ))
          }
        </div>
        <div className="card" style={{padding:18}}>
          <div style={{fontWeight:600,marginBottom:14,fontSize:13,color:'var(--muted)'}}>วิธีชำระเงิน</div>
          {['cash','qr','card'].map(m=>{
            const cnt = txns.filter(t=>t.payment_method===m).length;
            const pct = txns.length ? Math.round(cnt/txns.length*100) : 0;
            const label = m==='cash'?'💵 เงินสด':m==='qr'?'📱 QR':'💳 บัตร';
            return (
              <div key={m} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,fontSize:12}}>
                <div style={{width:72}}>{label}</div>
                <div style={{flex:1,height:8,background:'var(--faint)',borderRadius:4}}><div style={{width:pct+'%',height:'100%',background:'var(--blue)',borderRadius:4}}></div></div>
                <div style={{fontWeight:600,width:50}}>{cnt} ({pct}%)</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="card-hd"><h3>รายการบิลล่าสุด</h3>{loading && <span className="spinner"></span>}</div>
        <table>
          <thead><tr><th>บิล</th><th>ลูกค้า</th><th>รายการ</th><th>ส่วนลด</th><th>ยอด</th><th>ชำระ</th><th>เวลา</th></tr></thead>
          <tbody>
            {!txns.length && <tr><td colSpan={7} style={{textAlign:'center',color:'var(--muted)',padding:32}}>ยังไม่มีข้อมูลในช่วงนี้</td></tr>}
            {txns.slice(0,30).map(t=>(
              <tr key={t.id}>
                <td style={{fontFamily:'monospace',fontSize:10}}>{t.txn_code}</td>
                <td style={{fontSize:11}}>{t.customers?.name||'ทั่วไป'}</td>
                <td style={{fontSize:11}}>{(t.transaction_items||[]).map(i=>`${i.strain_name} ${i.weight_g}g`).join(', ')}</td>
                <td style={{color:'var(--purple)',fontSize:11}}>{(t.discount_item+t.discount_bill)>0?'-'+fmt(t.discount_item+t.discount_bill):'—'}</td>
                <td style={{fontWeight:600,color:'var(--green)'}}>{fmt(t.grand_total)}</td>
                <td><span className={`pill ${t.payment_method==='cash'?'ok':t.payment_method==='qr'?'s':'c'}`}>{t.payment_method==='cash'?'เงินสด':t.payment_method==='qr'?'QR':'บัตร'}</span></td>
                <td style={{fontSize:10,color:'var(--muted)'}}>{new Date(t.created_at).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'})}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── STAFF VIEW ───────────────────────────────────────────────
function StaffView({ db }) {
  const [staffList, setStaffList] = useState([]);
  const [modal, setModal]         = useState(null); // 'add' | 'edit'
  const [editing, setEditing]     = useState(null);
  const [loading, setLoading]     = useState(false);
  const [msg, setMsg]             = useState(null);

  const initForm = { name:'', role:'staff', pin1:'', pin2:'', changePIN: false };
  const [form, setForm] = useState(initForm);
  const [pinStep, setPinStep] = useState('pin1');
  const [pinErr, setPinErr]   = useState('');
  const [pinShake, setPinShake] = useState(false);

  useEffect(() => { load(); }, []);

  async function load() {
    const { data } = await db.from('staff').select('*').order('created_at');
    if (data) setStaffList(data);
  }

  function setF(k, v) { setForm(p => ({...p, [k]: v})); }

  function openAdd() {
    setForm(initForm); setPinStep('pin1'); setPinErr(''); setEditing(null); setModal('add');
  }
  function openEdit(s) {
    setForm({ name:s.name, role:s.role, pin1:'', pin2:'', changePIN: false });
    setPinStep('pin1'); setPinErr(''); setEditing(s); setModal('edit');
  }

  function handlePinDigit(d) {
    setPinErr('');
    if (pinStep === 'pin1' && form.pin1.length < 6) {
      const next = form.pin1 + d;
      setF('pin1', next);
      if (next.length === 6) setPinStep('pin2');
    } else if (pinStep === 'pin2' && form.pin2.length < 6) {
      setF('pin2', form.pin2 + d);
    }
  }
  function handlePinBack() {
    setPinErr('');
    if (pinStep === 'pin2' && form.pin2.length === 0) { setPinStep('pin1'); setF('pin1', form.pin1.slice(0,-1)); }
    else if (pinStep === 'pin2') setF('pin2', form.pin2.slice(0,-1));
    else setF('pin1', form.pin1.slice(0,-1));
  }

  async function save() {
    const needPIN = modal === 'add' || (modal === 'edit' && form.changePIN);
    if (needPIN) {
      if (form.pin1 !== form.pin2) {
        setPinErr('PIN ไม่ตรงกัน'); setPinShake(true);
        setF('pin1',''); setF('pin2',''); setPinStep('pin1');
        setTimeout(()=>setPinShake(false),400); return;
      }
    }
    setLoading(true);
    try {
      let payload = { name: form.name.trim(), role: form.role };
      if (needPIN) {
        const salt = generateSalt();
        const hash = await hashPIN(salt, form.pin1);
        payload = { ...payload, pin_salt: salt, pin_hash: hash };
      }
      let error;
      if (editing) {
        ({ error } = await db.from('staff').update(payload).eq('id', editing.id));
      } else {
        ({ error } = await db.from('staff').insert(payload));
      }
      if (error) throw error;
      setMsg({ type:'ok', text: editing ? 'อัปเดตสำเร็จ' : 'เพิ่มพนักงานสำเร็จ' });
      setModal(null); load();
    } catch(e) {
      setMsg({ type:'err', text: e.message });
    }
    setLoading(false);
    setTimeout(() => setMsg(null), 3000);
  }

  async function toggleActive(s) {
    await db.from('staff').update({ is_active: !s.is_active }).eq('id', s.id);
    load();
  }

  const needPIN = modal === 'add' || (modal === 'edit' && form.changePIN);
  const currentPin = pinStep === 'pin1' ? form.pin1 : form.pin2;
  const canSave = form.name.trim() && (!needPIN || (form.pin1.length===6 && form.pin2.length===6));
  const numpadKeys = ['1','2','3','4','5','6','7','8','9','','0','del'];

  return (
    <div className="page">
      {msg && <div className={`alert alert-${msg.type==='ok'?'ok':'err'}`}>{msg.text}</div>}

      <div className="page-title">
        จัดการพนักงาน
        <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={openAdd}>
          + เพิ่มพนักงาน
        </button>
      </div>

      <div className="card">
        <table>
          <thead>
            <tr><th>ชื่อ</th><th>Role</th><th>สถานะ</th><th>เพิ่มเมื่อ</th><th>จัดการ</th></tr>
          </thead>
          <tbody>
            {!staffList.length && (
              <tr><td colSpan={5} style={{textAlign:'center',color:'var(--muted)',padding:32}}>ยังไม่มีข้อมูล</td></tr>
            )}
            {staffList.map(s => (
              <tr key={s.id}>
                <td style={{fontWeight:600}}>{s.name}</td>
                <td>
                  <span className={`pill ${s.role==='owner'?'s':'h'}`}>
                    {s.role === 'owner' ? 'Owner' : 'Staff'}
                  </span>
                </td>
                <td>
                  <span className={`pill ${s.is_active?'ok':'out'}`}>
                    {s.is_active ? 'Active' : 'ปิด'}
                  </span>
                </td>
                <td style={{fontSize:11,color:'var(--muted)'}}>
                  {new Date(s.created_at).toLocaleDateString('th-TH')}
                </td>
                <td>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-sm btn-outline" onClick={()=>openEdit(s)}>แก้ไข</button>
                    <button className="btn btn-sm btn-outline" onClick={()=>toggleActive(s)}>
                      {s.is_active ? 'ปิด' : 'เปิด'}
                    </button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {modal && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div className="modal-hd">
              <h3>{modal==='add' ? 'เพิ่มพนักงาน' : 'แก้ไขข้อมูล'}</h3>
              <button className="close-btn" onClick={()=>setModal(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                <div>
                  <label>ชื่อ *</label>
                  <input value={form.name} onChange={e=>setF('name',e.target.value)} placeholder="ชื่อพนักงาน" />
                </div>
                <div>
                  <label>Role</label>
                  <select value={form.role} onChange={e=>setF('role',e.target.value)}>
                    <option value="staff">Staff</option>
                    <option value="owner">Owner</option>
                  </select>
                </div>

                {modal === 'edit' && (
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <input type="checkbox" id="changePIN" checked={form.changePIN}
                           onChange={e=>{ setF('changePIN',e.target.checked); setF('pin1',''); setF('pin2',''); setPinStep('pin1'); setPinErr(''); }} />
                    <label htmlFor="changePIN" style={{textTransform:'none',fontSize:13,letterSpacing:0,color:'var(--text)',marginBottom:0}}>
                      เปลี่ยน PIN
                    </label>
                  </div>
                )}

                {needPIN && (
                  <div className="auth-section" style={{marginTop:0}}>
                    <div className="auth-section-label">
                      {pinStep==='pin1' || form.pin1.length===0 ? 'ตั้ง PIN (6 หลัก)' : 'ยืนยัน PIN'}
                    </div>
                    <div className={`pin-dots ${pinShake?'shake':''}`} style={{marginBottom:12}}>
                      {[0,1,2,3,4,5].map(i => (
                        <div key={i} className={`pin-dot ${i < currentPin.length ? (pinErr?'err':'filled') : ''}`}/>
                      ))}
                    </div>
                    <div className="pin-err">{pinErr}</div>
                    <div className="numpad" style={{maxWidth:200,margin:'0 auto'}}>
                      {numpadKeys.map((k,i) => {
                        if (k==='') return <div key={i} className="numpad-key empty"/>;
                        if (k==='del') return <button key={i} className="numpad-key del" onClick={handlePinBack}>⌫</button>;
                        return <button key={i} className="numpad-key" onClick={()=>handlePinDigit(k)} disabled={currentPin.length>=6}>{k}</button>;
                      })}
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="modal-ft">
              <button className="btn btn-outline" onClick={()=>setModal(null)}>ยกเลิก</button>
              <button className="btn btn-primary" onClick={save} disabled={!canSave||loading}>
                {loading ? 'กำลังบันทึก...' : 'บันทึก'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT APP ─────────────────────────────────────────────────
function App() {
  const [db, setDb]           = useState(null);
  const [view, setView]       = useState('pos');
  const [clk, setClk]         = useState('');
  // authState: 'loading' | 'bootstrap' | 'login' | 'ready' | 'error'
  const [authState, setAuthState] = useState('loading');
  const [currentStaff, setCurrentStaff] = useState(null);
  const [authErr, setAuthErr]     = useState('');

  // Clock tick
  useEffect(() => {
    const tick = () => {
      const n = new Date();
      setClk(n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0'));
    };
    tick();
    const t = setInterval(tick, 30000);
    return () => clearInterval(t);
  }, []);

  // Auto-connect: ใช้ hardcoded credentials เป็น default
  useEffect(() => {
    const url = localStorage.getItem('sb_url') || SUPABASE_URL;
    const key = localStorage.getItem('sb_key') || SUPABASE_KEY;
    localStorage.setItem('sb_url', url);
    localStorage.setItem('sb_key', key);
    const client = getClient(url, key);
    if (client) handleDbReady(client);
  }, []);

  async function handleDbReady(client) {
    setDb(client);
    await runInitSequence(client);
  }

  async function runInitSequence(client) {
    setAuthState('loading');
    try {
      // Step 2: Check if any active staff exist
      const { count, error: countErr } = await client
        .from('staff').select('*', { count: 'exact', head: true });
      if (countErr) throw countErr;

      if (count === 0) {
        setAuthState('bootstrap');
        return;
      }

      // Step 3: Validate existing session
      const raw = localStorage.getItem('gm_staff');
      if (!raw) { setAuthState('login'); return; }

      let saved;
      try { saved = JSON.parse(raw); } catch { localStorage.removeItem('gm_staff'); setAuthState('login'); return; }

      const { data: staffRow, error: staffErr } = await client
        .from('staff').select('id, name, role, is_active').eq('id', saved.id).single();

      if (staffErr || !staffRow || !staffRow.is_active) {
        localStorage.removeItem('gm_staff');
        setAuthState('login');
        return;
      }

      // role from DB overwrites localStorage (prevents tampering)
      const validated = { id: staffRow.id, name: staffRow.name, role: staffRow.role };
      localStorage.setItem('gm_staff', JSON.stringify(validated));
      setCurrentStaff(validated);
      setAuthState('ready');

    } catch (e) {
      setAuthErr(e.message || 'เชื่อมต่อไม่ได้');
      setAuthState('error');
    }
  }

  function handleLogin(staffObj) {
    setCurrentStaff(staffObj);
    setAuthState('ready');
  }

  function handleLogout() {
    localStorage.removeItem('gm_staff');
    setCurrentStaff(null);
    setView('pos');
    setAuthState('login');
  }

  function handleBootstrapDone(staffObj) {
    setCurrentStaff(staffObj);
    setAuthState('ready');
  }

  // ── RENDER ───────────────────────────────────────────────────
  const navTabs = [
    { id:'pos',       label:'ขาย',      icon:'ShoppingCart' },
    { id:'stock',     label:'สต็อก',    icon:'Package',   ownerOnly: true },
    { id:'customers', label:'ลูกค้า',   icon:'Users' },
    { id:'report',    label:'รายงาน',   icon:'BarChart2', ownerOnly: true },
    { id:'staff',     label:'พนักงาน',  icon:'UserCog',   ownerOnly: true },
  ];

  const visibleTabs = navTabs.filter(t => !t.ownerOnly || currentStaff?.role === 'owner');

  return (
    <>
      <div className="nav">
        <div className="brand">GM.Weed POS</div>
        {authState === 'ready' && (
          <div style={{display:'flex',gap:2}}>
            {visibleTabs.map(t => (
              <button key={t.id} className={`ntab ${view===t.id?'on':''}`} onClick={()=>setView(t.id)}
                      style={{display:'flex',alignItems:'center',gap:6}}>
                <LucideIcon icon={t.icon} size={14}/>
                {t.label}
              </button>
            ))}
          </div>
        )}
        <div className="nav-r">
          {authState === 'ready' && currentStaff && (
            <>
              <span style={{fontSize:12,color:'rgba(255,255,255,.55)'}}>
                {currentStaff.name}
                <span style={{marginLeft:6,fontSize:10,padding:'1px 7px',borderRadius:20,
                  background:currentStaff.role==='owner'?'rgba(250,204,21,.2)':'rgba(74,222,128,.15)',
                  color:currentStaff.role==='owner'?'#fbbf24':'#4ade80'}}>
                  {currentStaff.role==='owner'?'Owner':'Staff'}
                </span>
              </span>
              <button onClick={handleLogout} title="Logout"
                      style={{background:'none',border:'none',color:'rgba(255,255,255,.4)',cursor:'pointer',
                              display:'flex',alignItems:'center',gap:4,fontSize:12,padding:'4px 8px',
                              borderRadius:6,transition:'color 120ms'}}
                      onMouseEnter={e=>e.currentTarget.style.color='#f87171'}
                      onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,.4)'}>
                <LucideIcon icon="LogOut" size={14}/>
              </button>
            </>
          )}
          <span className={`db-badge ${db?'db-ok':'db-err'}`}>{db?'🟢 DB Connected':'🔴 ไม่ได้เชื่อมต่อ'}</span>
          <div className="clk">{clk}</div>
        </div>
      </div>

      {!db && <SetupBanner onConnect={handleDbReady} />}

      {db && authState === 'loading' && (
        <div className="page"><div className="empty" style={{marginTop:80}}>
          <div className="spinner" style={{width:32,height:32,borderWidth:3}}></div>
          <p style={{marginTop:16,color:'var(--muted)'}}>กำลังตรวจสอบ...</p>
        </div></div>
      )}

      {db && authState === 'error' && (
        <div className="page"><div className="empty" style={{marginTop:80}}>
          <div className="empty-icon">⚠️</div>
          <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p>
          <p style={{fontSize:13,color:'var(--muted)',marginBottom:20}}>{authErr}</p>
          <button className="btn btn-primary" onClick={()=>runInitSequence(db)}>ลองใหม่</button>
        </div></div>
      )}

      {db && authState === 'bootstrap' && (
        <BootstrapScreen db={db} onDone={handleBootstrapDone} />
      )}

      {db && authState === 'login' && (
        <LoginScreen db={db} onLogin={handleLogin} />
      )}

      {db && authState === 'ready' && (
        <>
          {view === 'pos'       && <POSView       db={db} currentStaff={currentStaff} />}
          {view === 'stock'     && <StockView     db={db} />}
          {view === 'customers' && <CustomersView db={db} />}
          {view === 'report'    && <ReportView    db={db} />}
          {view === 'staff'     && <StaffView     db={db} />}
        </>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
